<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f2e">
<title>Album FIFA</title>
<script src="./supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:#080d24;color:#e8eaf6;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-box{background:#0f1635;border:1px solid #1e2d5a;border-radius:16px;padding:32px 24px;width:100%;max-width:380px}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo .trophy{font-size:40px}
.auth-logo h1{font-size:20px;font-weight:800;color:#f5c842;text-transform:uppercase;letter-spacing:1.5px;margin-top:8px}
.auth-logo p{font-size:11px;color:#6b7db3;margin-top:4px}
.auth-tabs{display:flex;margin-bottom:24px;background:#080d24;border-radius:10px;padding:3px}
.auth-tab{flex:1;padding:8px;border:none;background:none;color:#6b7db3;font-size:13px;font-weight:600;cursor:pointer;border-radius:8px}
.auth-tab.on{background:#1e2d5a;color:#e8eaf6}
.auth-field{margin-bottom:14px}
.auth-field label{display:block;font-size:11px;font-weight:600;color:#6b7db3;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.auth-field input{width:100%;background:#080d24;border:1px solid #1e2d5a;border-radius:10px;color:#e8eaf6;font-size:14px;padding:11px 14px;outline:none;-webkit-appearance:none}
.auth-btn{width:100%;padding:13px;background:#f5c842;border:none;border-radius:10px;font-size:14px;font-weight:700;color:#0a0f2e;cursor:pointer;margin-top:8px}
.auth-err{background:#2d0a0a;border:1px solid #7f1d1d;color:#fca5a5;font-size:12px;padding:10px 14px;border-radius:8px;margin-top:12px;display:none}
.auth-err.show{display:block}
.app{display:none;max-width:520px;margin:0 auto;padding-bottom:80px}
.app.show{display:block}
.hdr{background:#0a1628;padding:12px 16px 0;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.hdr-logo{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.hdr-icon{font-size:22px}
.hdr-title{font-size:16px;font-weight:800;color:#f5c842;text-transform:uppercase;letter-spacing:1px}
.hdr-sub{font-size:9px;color:#6b7db3}
.hdr-user{display:flex;align-items:center;gap:8px}
.hdr-username{font-size:11px;color:#6b7db3;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-logout{background:none;border:1px solid #1e2d5a;color:#6b7db3;font-size:10px;padding:4px 8px;border-radius:6px;cursor:pointer}
.hdr-prog{margin-top:10px;background:#1e2d5a;border-radius:4px;height:4px;overflow:hidden}
.hdr-fill{height:100%;background:#f5c842;border-radius:4px;width:0%;transition:width 0.3s}
.nav{display:flex;background:#080d24;border-bottom:1px solid #1e2d5a;position:sticky;top:68px;z-index:99}
.nav-btn{flex:1;padding:10px 4px;border:none;background:none;color:#6b7db3;font-size:11px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent}
.nav-btn.on{color:#f5c842;border-bottom-color:#f5c842}
.tab-content{display:none;padding:12px 16px}
.tab-content.on{display:block}
.stats-bar{display:flex;gap:8px;margin-bottom:12px}
.stat-box{flex:1;background:#0f1635;border:1px solid #1e2d5a;border-radius:10px;padding:10px;text-align:center}
.stat-num{font-size:22px;font-weight:800;color:#f5c842;line-height:1}
.stat-lbl{font-size:9px;color:#6b7db3;margin-top:2px}
.stat-box.green .stat-num{color:#22c55e}
.stat-box.blue .stat-num{color:#60a5fa}
.filters{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto}
.filters::-webkit-scrollbar{display:none}
.fbtn{flex-shrink:0;background:#0f1635;border:1px solid #1e2d5a;color:#6b7db3;font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;cursor:pointer}
.fbtn.on{background:#f5c842;border-color:#f5c842;color:#0a0f2e}
.search-box{width:100%;background:#0f1635;border:1px solid #1e2d5a;border-radius:10px;color:#e8eaf6;font-size:13px;padding:9px 12px;margin-bottom:10px;outline:none;-webkit-appearance:none}
.grupo{margin-bottom:12px}
.grupo-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:10px 10px 0 0}
.grupo-nome{font-size:11px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:1px}
.grupo-badge{font-size:10px;background:rgba(255,255,255,0.18);padding:2px 7px;border-radius:10px;color:rgba(255,255,255,0.9)}
.team-block{background:#0f1635;border:1px solid #1e2d5a;border-top:none;padding:8px 8px 6px}
.team-block:last-child{border-radius:0 0 10px 10px}
.team-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.team-nome{font-size:10px;font-weight:700;color:#6b7db3;text-transform:uppercase;letter-spacing:0.5px}
.team-prog{font-size:10px;color:#6b7db3}
.team-prog b{color:#22c55e}
.grid{display:flex;flex-wrap:wrap;gap:4px}
.cromo{width:48px;border-radius:8px;border:1px solid #1e2d5a;background:#162040;cursor:pointer;position:relative;user-select:none;-webkit-user-select:none;overflow:hidden}
.cromo-inner{padding:3px 2px 2px;display:flex;flex-direction:column;align-items:center;gap:1px}
.cromo-code{font-size:7.5px;font-weight:700;color:#6b7db3;text-align:center;line-height:1.2}
.cromo-actions{display:flex;width:100%}
.cromo-btn{flex:1;border:none;font-size:8px;font-weight:700;cursor:pointer;padding:3px 1px;text-align:center}
.cromo-btn.col{background:#0f2d1f;color:#6b7db3}
.cromo-btn.rep{background:#1a1f3a;color:#6b7db3}
.cromo-btn.col.on{background:#15803d;color:#fff}
.cromo-btn.rep.on{background:#1d4ed8;color:#fff}
.cromo-rep-num{font-size:7px;color:#60a5fa;text-align:center;line-height:1;padding-bottom:1px}
.user-card{background:#0f1635;border:1px solid #1e2d5a;border-radius:10px;padding:12px;margin-bottom:8px}
.user-card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.user-card-name{font-size:14px;font-weight:700;color:#f5c842}
.user-card-stats{display:flex;gap:8px}
.user-stat{font-size:10px;color:#6b7db3}
.user-stat b{color:#e8eaf6}
.match-section{margin-top:8px}
.match-title{font-size:10px;font-weight:700;color:#6b7db3;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.match-codes{display:flex;flex-wrap:wrap;gap:3px}
.match-code{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px}
.match-code.need{background:#1d3a1d;color:#22c55e;border:1px solid #15803d}
.match-code.have{background:#1d2d5a;color:#60a5fa;border:1px solid #1d4ed8}
.no-match{font-size:11px;color:#6b7db3;font-style:italic}
.loading{text-align:center;padding:32px;color:#6b7db3;font-size:13px}
.empty{text-align:center;padding:32px;color:#6b7db3;font-size:13px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#0f1635;border:1px solid #1e2d5a;color:#f5c842;font-size:12px;font-weight:600;padding:8px 18px;border-radius:20px;opacity:0;pointer-events:none;z-index:999;white-space:nowrap;transition:opacity 0.25s}
.toast.show{opacity:1}
.gc0{background:#1a3a6b}.gc1{background:#6b1a1a}.gc2{background:#1a5c2a}.gc3{background:#6b4a1a}.gc4{background:#4a1a6b}.gc5{background:#1a5c5c}.gc6{background:#6b1a4a}.gc7{background:#1a4a6b}.gc8{background:#4a4a1a}.gc9{background:#6b3a1a}.gc10{background:#1a6b4a}.gc11{background:#5c1a6b}.gc12{background:#2a5c3a}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #1e2d5a;border-top-color:#f5c842;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="auth-wrap" id="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="trophy">&#127942;</div>
      <h1>FIFA World Cup</h1>
      <p>Album de Cromos Interativo</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab on" onclick="authTab('login')">Entrar</button>
      <button class="auth-tab" onclick="authTab('register')">Registar</button>
    </div>
    <div class="auth-field" id="field-username" style="display:none">
      <label>Username</label>
      <input type="text" id="inp-username" placeholder="ex: joao123">
    </div>
    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="inp-email" placeholder="email@exemplo.com">
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="inp-pass" placeholder="Password">
    </div>
    <button class="auth-btn" id="auth-submit" onclick="doAuth()">Entrar</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<div class="app" id="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-logo">
        <div class="hdr-icon">&#127942;</div>
        <div>
          <div class="hdr-title">FIFA Album</div>
          <div class="hdr-sub" id="hdr-sub">A carregar...</div>
        </div>
      </div>
      <div class="hdr-user">
        <span class="hdr-username" id="hdr-username"></span>
        <button class="hdr-logout" onclick="doLogout()">Sair</button>
      </div>
    </div>
    <div class="hdr-prog"><div class="hdr-fill" id="hdr-fill"></div></div>
  </div>

  <div class="nav">
    <button class="nav-btn on" id="nav-album" onclick="showTab('album',this)">&#127968; Album</button>
    <button class="nav-btn" id="nav-repetidos" onclick="showTab('repetidos',this)">&#128257; Repetidos</button>
    <button class="nav-btn" id="nav-comunidade" onclick="showTab('comunidade',this)">&#128101; Comunidade</button>
  </div>

  <div class="tab-content on" id="tab-album">
    <div class="stats-bar">
      <div class="stat-box"><div class="stat-num" id="st-total">0</div><div class="stat-lbl">Total</div></div>
      <div class="stat-box green"><div class="stat-num" id="st-col">0</div><div class="stat-lbl">Colados</div></div>
      <div class="stat-box"><div class="stat-num" id="st-falta">0</div><div class="stat-lbl">Em falta</div></div>
    </div>
    <div class="filters">
      <button class="fbtn on" id="fb0" onclick="setF(0)">Todos</button>
      <button class="fbtn" id="fb1" onclick="setF(1)">Em falta</button>
      <button class="fbtn" id="fb2" onclick="setF(2)">Colados</button>
    </div>
    <input class="search-box" id="sq" type="search" placeholder="Pesquisar cromo ou pais..." oninput="renderAlbum()">
    <div id="album-ct"><div class="loading"><span class="spinner"></span>A carregar...</div></div>
  </div>

  <div class="tab-content" id="tab-repetidos">
    <div class="stats-bar">
      <div class="stat-box blue"><div class="stat-num" id="st-rep">0</div><div class="stat-lbl">Repetidos</div></div>
      <div class="stat-box"><div class="stat-num" id="st-rep-tot">0</div><div class="stat-lbl">Copias total</div></div>
    </div>
    <input class="search-box" id="sq-rep" type="search" placeholder="Pesquisar repetido..." oninput="renderRepetidos()">
    <div id="rep-ct"><div class="empty">Nenhum cromo repetido ainda.<br>No album, clica Rep para adicionar.</div></div>
  </div>

  <div class="tab-content" id="tab-comunidade">
    <input class="search-box" id="sq-comm" type="search" placeholder="Pesquisar utilizador ou cromo..." oninput="renderComunidade()">
    <div id="comm-ct"><div class="loading"><span class="spinner"></span>A carregar...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

var TOTAL = 0;
for (var i = 0; i < DATA.length; i++) TOTAL += DATA[i].c.length;

var currentUser = null;
var colados = {};
var repetidos = {};
var fmode = 0;
var allProfiles = [];
var allColados = {};
var allRepetidos = {};
var authMode = 'login';

function authTab(mode) {
  authMode = mode;
  document.getElementById('field-username').style.display = mode === 'register' ? 'block' : 'none';
  document.getElementById('auth-submit').textContent = mode === 'login' ? 'Entrar' : 'Registar';
  var tabs = document.querySelectorAll('.auth-tab');
  tabs[0].className = mode === 'login' ? 'auth-tab on' : 'auth-tab';
  tabs[1].className = mode === 'register' ? 'auth-tab on' : 'auth-tab';
  document.getElementById('auth-err').className = 'auth-err';
}

function showAuthErr(msg) {
  var el = document.getElementById('auth-err');
  el.textContent = msg;
  el.className = 'auth-err show';
}

async function doAuth() {
  var email = document.getElementById('inp-email').value.trim();
  var pass = document.getElementById('inp-pass').value;
  var btn = document.getElementById('auth-submit');
  var label = authMode === 'login' ? 'Entrar' : 'Registar';
  btn.textContent = '...';
  btn.disabled = true;
  document.getElementById('auth-err').className = 'auth-err';

  try {
    if (authMode === 'login') {
      var res = await sb.auth.signInWithPassword({ email: email, password: pass });
      if (res.error) { showAuthErr(res.error.message); }
      else if (res.data && res.data.user) {
        var user = res.data.user;
        var pp = await sb.from('profiles').select('username').eq('id', user.id).single();
        var username = pp.data ? pp.data.username : user.email;
        await initApp(user, username);
      }
    } else {
      var username = document.getElementById('inp-username').value.trim();
      if (!username) { showAuthErr('Introduz um username'); btn.textContent = label; btn.disabled = false; return; }
      if (pass.length < 6) { showAuthErr('Password deve ter pelo menos 6 caracteres'); btn.textContent = label; btn.disabled = false; return; }
      var res = await sb.auth.signUp({ email: email, password: pass });
      if (res.error) { showAuthErr(res.error.message); }
      else if (res.data && res.data.user) {
        var user = res.data.user;
        await sb.from('profiles').insert({ id: user.id, username: username });
        await initApp(user, username);
      }
    }
  } catch(e) {
    showAuthErr('Erro: ' + e.message);
  }

  btn.textContent = label;
  btn.disabled = false;
}

async function doLogout() {
  try { await sb.auth.signOut(); } catch(e) {}
  currentUser = null;
  colados = {};
  repetidos = {};
  document.getElementById('auth-wrap').style.display = 'flex';
  document.getElementById('app').className = 'app';
  document.getElementById('inp-email').value = '';
  document.getElementById('inp-pass').value = '';
}

async function loadUserData() {
  var uid = currentUser.id;
  colados = {};
  repetidos = {};
  try {
    var pc = await sb.from('cromos_colados').select('codigo').eq('user_id', uid);
    if (pc.data) { for (var i = 0; i < pc.data.length; i++) colados[pc.data[i].codigo] = true; }
    var pr = await sb.from('cromos_repetidos').select('codigo,quantidade').eq('user_id', uid);
    if (pr.data) { for (var i = 0; i < pr.data.length; i++) repetidos[pr.data[i].codigo] = pr.data[i].quantidade; }
  } catch(e) { console.log('loadUserData error:', e); }
  updateHeader();
  renderAlbum();
}

async function toggleColado(code) {
  var uid = currentUser.id;
  if (colados[code]) {
    colados[code] = false;
    await sb.from('cromos_colados').delete().eq('user_id', uid).eq('codigo', code);
  } else {
    colados[code] = true;
    await sb.from('cromos_colados').insert({ user_id: uid, codigo: code });
  }
  updateHeader();
  var el = document.getElementById('col_' + code);
  if (el) el.className = 'cromo-btn col' + (colados[code] ? ' on' : '');
  if (fmode === 1 && colados[code]) { var c = document.getElementById('cr_' + code); if (c) c.style.display = 'none'; }
  if (fmode === 2 && !colados[code]) { var c = document.getElementById('cr_' + code); if (c) c.style.display = 'none'; }
}

async function changeRep(code, delta) {
  var uid = currentUser.id;
  var cur = repetidos[code] || 0;
  var next = cur + delta;
  if (next < 0) next = 0;
  repetidos[code] = next;
  if (next === 0) {
    await sb.from('cromos_repetidos').delete().eq('user_id', uid).eq('codigo', code);
  } else if (cur === 0) {
    await sb.from('cromos_repetidos').insert({ user_id: uid, codigo: code, quantidade: next });
  } else {
    await sb.from('cromos_repetidos').update({ quantidade: next }).eq('user_id', uid).eq('codigo', code);
  }
  var numEl = document.getElementById('repnum_' + code);
  if (numEl) numEl.textContent = next > 0 ? 'x' + next : '';
  var repBtn = document.getElementById('rep_' + code);
  if (repBtn) repBtn.className = 'cromo-btn rep' + (next > 0 ? ' on' : '');
  updateRepStats();
  renderRepetidos();
}

function updateHeader() {
  var n = 0;
  for (var k in colados) { if (colados[k]) n++; }
  document.getElementById('st-col').textContent = n;
  document.getElementById('st-total').textContent = TOTAL;
  document.getElementById('st-falta').textContent = TOTAL - n;
  document.getElementById('hdr-fill').style.width = Math.round(n / TOTAL * 100) + '%';
  document.getElementById('hdr-sub').textContent = n + '/' + TOTAL + ' cromos colados';
  updateRepStats();
}

function updateRepStats() {
  var codes = 0, total = 0;
  for (var k in repetidos) { if (repetidos[k] > 0) { codes++; total += repetidos[k]; } }
  document.getElementById('st-rep').textContent = codes;
  document.getElementById('st-rep-tot').textContent = total;
}

function setF(m) {
  fmode = m;
  for (var i = 0; i < 3; i++) {
    var b = document.getElementById('fb' + i);
    if (b) b.className = i === m ? 'fbtn on' : 'fbtn';
  }
  renderAlbum();
}

function showTab(tab, btn) {
  var tabs = document.querySelectorAll('.tab-content');
  for (var i = 0; i < tabs.length; i++) tabs[i].className = 'tab-content';
  var btns = document.querySelectorAll('.nav-btn');
  for (var i = 0; i < btns.length; i++) btns[i].className = 'nav-btn';
  document.getElementById('tab-' + tab).className = 'tab-content on';
  if (btn) btn.className = 'nav-btn on';
  if (tab === 'comunidade') loadComunidade();
  if (tab === 'repetidos') renderRepetidos();
}

function buildGroups() {
  var order = [], map = {};
  for (var i = 0; i < DATA.length; i++) {
    var sec = DATA[i]; var gn = sec.g || 'FIFA';
    if (!map[gn]) { map[gn] = []; order.push(gn); }
    map[gn].push(sec);
  }
  return { order: order, map: map };
}

function renderAlbum() {
  var q = (document.getElementById('sq').value || '').toLowerCase();
  var ct = document.getElementById('album-ct');
  ct.innerHTML = '';
  var bg = buildGroups();
  var any = false;
  for (var gi = 0; gi < bg.order.length; gi++) {
    var gn = bg.order[gi]; var secs = bg.map[gn];
    var gHtml = '', gTot = 0, gDone = 0;
    for (var si = 0; si < secs.length; si++) {
      var sec = secs[si]; var vis = [], tDone = 0;
      for (var ci = 0; ci < sec.c.length; ci++) {
        var code = sec.c[ci]; var on = !!colados[code];
        if (on) tDone++; gTot++; if (on) gDone++;
        var mq = !q || code.toLowerCase().indexOf(q) !== -1 || sec.p.toLowerCase().indexOf(q) !== -1;
        var mf = fmode === 0 || (fmode === 1 && !on) || (fmode === 2 && on);
        if (mq && mf) vis.push(code);
      }
      if (!vis.length) continue; any = true;
      var cells = '';
      for (var vi = 0; vi < vis.length; vi++) {
        var vc = vis[vi]; var rn = repetidos[vc] || 0;
        cells += '<div id="cr_' + vc + '" class="cromo" data-code="' + vc + '">'
          + '<div class="cromo-inner"><span class="cromo-code">' + vc + '</span>'
          + '<span class="cromo-rep-num" id="repnum_' + vc + '">' + (rn > 0 ? 'x' + rn : '') + '</span></div>'
          + '<div class="cromo-actions">'
          + '<button id="col_' + vc + '" class="cromo-btn col' + (colados[vc] ? ' on' : '') + '" onclick="toggleColado(\'' + vc + '\')">Col</button>'
          + '<button id="rep_' + vc + '" class="cromo-btn rep' + (rn > 0 ? ' on' : '') + '" onclick="changeRep(\'' + vc + '\',1)">Rep+</button>'
          + '</div></div>';
      }
      gHtml += '<div class="team-block"><div class="team-hdr"><span class="team-nome">' + sec.p + '</span>'
        + '<span class="team-prog"><b>' + tDone + '</b>/' + sec.c.length + '</span></div>'
        + '<div class="grid">' + cells + '</div></div>';
    }
    if (!gHtml) continue;
    var s = document.createElement('div'); s.className = 'grupo';
    s.innerHTML = '<div class="grupo-hdr gc' + (gi % 13) + '"><span class="grupo-nome">' + gn + '</span>'
      + '<span class="grupo-badge">' + gDone + '/' + gTot + '</span></div>' + gHtml;
    ct.appendChild(s);
  }
  if (!any) ct.innerHTML = '<div class="empty">Nenhum cromo encontrado</div>';
}

function renderRepetidos() {
  var q = (document.getElementById('sq-rep').value || '').toLowerCase();
  var ct = document.getElementById('rep-ct');
  ct.innerHTML = '';
  var bg = buildGroups(); var any = false;
  for (var gi = 0; gi < bg.order.length; gi++) {
    var gn = bg.order[gi]; var secs = bg.map[gn];
    var gHtml = '', gDone = 0;
    for (var si = 0; si < secs.length; si++) {
      var sec = secs[si]; var vis = [], tRep = 0;
      for (var ci = 0; ci < sec.c.length; ci++) {
        var code = sec.c[ci]; var rn = repetidos[code] || 0;
        if (rn > 0) { tRep += rn; gDone++; }
        var mq = !q || code.toLowerCase().indexOf(q) !== -1 || sec.p.toLowerCase().indexOf(q) !== -1;
        if (mq && rn > 0) vis.push(code);
      }
      if (!vis.length) continue; any = true;
      var cells = '';
      for (var vi = 0; vi < vis.length; vi++) {
        var vc = vis[vi]; var rn = repetidos[vc] || 0;
        cells += '<div class="cromo">'
          + '<div class="cromo-inner"><span class="cromo-code">' + vc + '</span>'
          + '<span class="cromo-rep-num" style="color:#60a5fa">x' + rn + '</span></div>'
          + '<div class="cromo-actions">'
          + '<button class="cromo-btn col on" style="background:#7f1d1d" onclick="changeRep(\'' + vc + '\',-1)">-1</button>'
          + '<button class="cromo-btn rep on" onclick="changeRep(\'' + vc + '\',1)">+1</button>'
          + '</div></div>';
      }
      gHtml += '<div class="team-block"><div class="team-hdr"><span class="team-nome">' + sec.p + '</span>'
        + '<span class="team-prog" style="color:#60a5fa"><b>' + tRep + '</b> rep.</span></div>'
        + '<div class="grid">' + cells + '</div></div>';
    }
    if (!gHtml) continue;
    var s = document.createElement('div'); s.className = 'grupo';
    s.innerHTML = '<div class="grupo-hdr gc' + (gi % 13) + '"><span class="grupo-nome">' + gn + '</span>'
      + '<span class="grupo-badge">' + gDone + ' tipos</span></div>' + gHtml;
    ct.appendChild(s);
  }
  if (!any) ct.innerHTML = '<div class="empty">Nenhum cromo repetido ainda.<br>No album, clica Rep+ num cromo para adicionar.</div>';
}

async function loadComunidade() {
  document.getElementById('comm-ct').innerHTML = '<div class="loading"><span class="spinner"></span>A carregar...</div>';
  var pp = await sb.from('profiles').select('id,username');
  if (pp.error) { document.getElementById('comm-ct').innerHTML = '<div class="empty">Erro ao carregar</div>'; return; }
  allProfiles = (pp.data || []).filter(function(p) { return p.id !== currentUser.id; });
  var pc = await sb.from('cromos_colados').select('user_id,codigo');
  allColados = {};
  if (pc.data) { for (var i = 0; i < pc.data.length; i++) { var r = pc.data[i]; if (!allColados[r.user_id]) allColados[r.user_id] = {}; allColados[r.user_id][r.codigo] = true; } }
  var pr = await sb.from('cromos_repetidos').select('user_id,codigo,quantidade');
  allRepetidos = {};
  if (pr.data) { for (var i = 0; i < pr.data.length; i++) { var r = pr.data[i]; if (!allRepetidos[r.user_id]) allRepetidos[r.user_id] = {}; allRepetidos[r.user_id][r.codigo] = r.quantidade; } }
  renderComunidade();
}

function renderComunidade() {
  var q = (document.getElementById('sq-comm').value || '').toLowerCase();
  var ct = document.getElementById('comm-ct');
  ct.innerHTML = '';
  if (!allProfiles.length) { ct.innerHTML = '<div class="empty">Nenhum outro utilizador ainda.</div>'; return; }
  var myNeed = {};
  for (var i = 0; i < DATA.length; i++) { for (var ci = 0; ci < DATA[i].c.length; ci++) { var code = DATA[i].c[ci]; if (!colados[code]) myNeed[code] = true; } }
  var any = false;
  for (var pi = 0; pi < allProfiles.length; pi++) {
    var prof = allProfiles[pi];
    var theirRep = allRepetidos[prof.id] || {};
    var theirCol = allColados[prof.id] || {};
    var theirNeed = {};
    for (var i = 0; i < DATA.length; i++) { for (var ci = 0; ci < DATA[i].c.length; ci++) { var code = DATA[i].c[ci]; if (!theirCol[code]) theirNeed[code] = true; } }
    var theyGive = [], iGive = [];
    for (var code in theirRep) { if (theirRep[code] > 0 && myNeed[code]) { if (!q || code.toLowerCase().indexOf(q) !== -1 || prof.username.toLowerCase().indexOf(q) !== -1) theyGive.push(code); } }
    for (var code in repetidos) { if (repetidos[code] > 0 && theirNeed[code]) { if (!q || code.toLowerCase().indexOf(q) !== -1 || prof.username.toLowerCase().indexOf(q) !== -1) iGive.push(code); } }
    if (q && !theyGive.length && !iGive.length && prof.username.toLowerCase().indexOf(q) === -1) continue;
    any = true;
    var giveHtml = '';
    if (theyGive.length) { giveHtml += '<div class="match-section"><div class="match-title">Eles tem para te dar (' + theyGive.length + ')</div><div class="match-codes">'; for (var i = 0; i < theyGive.length; i++) giveHtml += '<span class="match-code need">' + theyGive[i] + '</span>'; giveHtml += '</div></div>'; }
    var getHtml = '';
    if (iGive.length) { getHtml += '<div class="match-section"><div class="match-title">Tu tens para lhes dar (' + iGive.length + ')</div><div class="match-codes">'; for (var i = 0; i < iGive.length; i++) getHtml += '<span class="match-code have">' + iGive[i] + '</span>'; getHtml += '</div></div>'; }
    if (!giveHtml && !getHtml) giveHtml = '<div class="no-match">Sem trocas possiveis de momento</div>';
    var card = document.createElement('div'); card.className = 'user-card';
    card.innerHTML = '<div class="user-card-hdr"><span class="user-card-name">&#128100; ' + prof.username + '</span>'
      + '<div class="user-card-stats"><span class="user-stat"><b>' + Object.keys(theirCol).length + '</b> col.</span><span class="user-stat"><b>' + Object.keys(theirRep).length + '</b> rep.</span></div></div>'
      + giveHtml + getHtml;
    ct.appendChild(card);
  }
  if (!any) ct.innerHTML = '<div class="empty">Nenhuma correspondencia encontrada</div>';
}

function showToast(msg) {
  var t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show';
  setTimeout(function() { t.className = 'toast'; }, 2000);
}

async function initApp(user, username) {
  currentUser = user;
  document.getElementById('hdr-username').textContent = username || user.email;
  document.getElementById('auth-wrap').style.display = 'none';
  document.getElementById('app').className = 'app show';
  await loadUserData();
}

// No onAuthStateChange - handled directly in doAuth

</script>
