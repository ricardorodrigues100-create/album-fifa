.stats-num { font-size: 20px; font-weight: 800; color: #f5c842; line-height: 1; }
.stats-lbl { font-size: 9px; color: #6b7db3; }
.prog-wrap { margin-top: 8px; background: #1e2d5a; border-radius: 4px; height: 5px; overflow: hidden; }

var TOTAL = 0;
for (var i = 0; i < DATA.length; i++) TOTAL += DATA[i].c.length;

var SK = 'fifa_v2';
var colados = {};
try { var s = localStorage.getItem(SK); if (s) colados = JSON.parse(s); } catch(e) {}

var filterMode = 0;

function save() { try { localStorage.setItem(SK, JSON.stringify(colados)); } catch(e) {} }

function countColados() {
  var n = 0;
  for (var k in colados) { if (colados[k]) n++; }
  return n;
}

function updateHeader() {
  var n = countColados();
  document.getElementById('cnt').innerHTML = n;
  document.getElementById('prog').style.width = Math.round(n / TOTAL * 100) + '%';
}

function setF(mode) {
  filterMode = mode;
  for (var i = 0; i < 3; i++) {
    var b = document.getElementById('fb' + i);
    if (b) b.className = (i === mode) ? 'fbtn on' : 'fbtn';
  }
  render();
}

function toggle(code) {
  colados[code] = !colados[code];
  save();
  updateHeader();
  var el = document.getElementById('cr_' + code);
  if (!el) return;
  el.className = colados[code] ? 'cromo on' : 'cromo';
  var grid = el.parentNode;
  var block = grid ? grid.parentNode : null;
  if (block) {
    var hdr = block.querySelector('.team-prog');
    if (hdr) {
      var all = block.querySelectorAll('.cromo');
      var done = block.querySelectorAll('.cromo.on');
      hdr.innerHTML = '<b>' + done.length + '</b>/' + all.length;
    }
  }
  if (filterMode === 1 && colados[code]) el.style.display = 'none';
  if (filterMode === 2 && !colados[code]) el.style.display = 'none';
}

function render() {
  var q = '';
  var sqEl = document.getElementById('sq');
  if (sqEl) q = (sqEl.value || '').toLowerCase();

  var ct = document.getElementById('ct');
  ct.innerHTML = '';

  var grupoOrder = [];
  var grupoMap = {};
  for (var i = 0; i < DATA.length; i++) {
    var sec = DATA[i];
    var gname = sec.g || 'FIFA';
    if (!grupoMap[gname]) { grupoMap[gname] = []; grupoOrder.push(gname); }
    grupoMap[gname].push(sec);
  }

  var anyVisible = false;

  for (var gi = 0; gi < grupoOrder.length; gi++) {
    var gname = grupoOrder[gi];
    var secs = grupoMap[gname];
    var groupHtml = '';
    var groupTotal = 0;
    var groupDone = 0;

    for (var si = 0; si < secs.length; si++) {
      var sec = secs[si];
      var visibleCromos = [];
      var teamDone = 0;

      for (var ci = 0; ci < sec.c.length; ci++) {
        var code = sec.c[ci];
        var isOn = !!colados[code];
        if (isOn) teamDone++;
        groupTotal++;
        if (isOn) groupDone++;
        var matchQ = !q || code.toLowerCase().indexOf(q) !== -1 || sec.p.toLowerCase().indexOf(q) !== -1;
        var matchF = filterMode === 0 || (filterMode === 1 && !isOn) || (filterMode === 2 && isOn);
        if (matchQ && matchF) visibleCromos.push(code);
      }

      if (visibleCromos.length === 0) continue;
      anyVisible = true;

      var cellsHtml = '';
      for (var vi = 0; vi < visibleCromos.length; vi++) {
        var vc = visibleCromos[vi];
        cellsHtml += '<div id="cr_' + vc + '" class="cromo' + (colados[vc] ? ' on' : '') + '" onclick="toggle(\'' + vc + '\')">'
          + '<span class="cromo-code">' + vc + '</span>'
          + '</div>';
      }

      groupHtml += '<div class="team-block">'
        + '<div class="team-hdr">'
        + '<span class="team-nome">' + sec.p + '</span>'
        + '<span class="team-prog"><b>' + teamDone + '</b>/' + sec.c.length + '</span>'
        + '</div>'
        + '<div class="grid">' + cellsHtml + '</div>'
        + '</div>';
    }

    if (!groupHtml) continue;

    var section = document.createElement('div');
    section.className = 'grupo-section';
    section.innerHTML = '<div class="grupo-hdr gc' + (gi % 13) + '">'
      + '<span class="grupo-nome">' + gname + '</span>'
      + '<span class="grupo-badge">' + groupDone + '/' + groupTotal + '</span>'
      + '</div>'
      + groupHtml;
    ct.appendChild(section);
  }

  if (!anyVisible) {
    ct.innerHTML = '<div class="empty">Nenhum cromo encontrado</div>';
  }
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.innerHTML = msg;
  t.className = 'toast show';
  setTimeout(function() { t.className = 'toast'; }, 2500);
}

function doExport() {
  var missing = [], have = [];
  for (var i = 0; i < DATA.length; i++) {
    for (var ci = 0; ci < DATA[i].c.length; ci++) {
      var code = DATA[i].c[ci];
      if (colados[code]) have.push(code); else missing.push(code);
    }
  }
  var n = countColados();
  var text = 'ALBUM FIFA\nColados: ' + n + '/' + TOTAL + '\nEm falta: ' + (TOTAL - n)
    + '\n\nEM FALTA:\n' + missing.join(', ')
    + '\n\nCOLADOS:\n' + have.join(', ');
  try {
    navigator.clipboard.writeText(text).then(function() { showToast('Copiado!'); });
  } catch(e) {
    showToast('Use partilhar do browser');
  }
}

function doReset() {
  var n = countColados();
  if (n === 0) { showToast('Nenhum cromo marcado'); return; }
  if (confirm('Apagar os ' + n + ' cromos marcados?')) {
    colados = {};
    save();
    updateHeader();
    render();
    showToast('Album reiniciado');
  }
}

updateHeader();
render();
</script>
</body>
</html>
